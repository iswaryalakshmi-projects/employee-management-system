<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4">
    <h2 class="text-center mb-4">Add Employee</h2>

<form method="POST">

    <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>
    <br><br>

    <input type="text" name="department" class="form-control mb-3" placeholder="Department" required>
    <br><br>

    <input type="number" name="salary" class="form-control mb-3" placeholder="Salary" required>
    <br><br>

    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
    <br><br>

    <input type="text" name="phone"class="form-control mb-3" placeholder="PhoneN0" required>
    <br><br>

    <button class="btn btn-primary">Add Employee</button>

</form>
</div>
</div>

</body>
</html>
