<!DOCTYPE html>
<html>
<head>
    <title>Search Employee</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4">
<h2 class="text-center mb-4">Search Employee</h2>

<form method="POST">
    <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name">
    <button calss="btn btn-primary">Search</button>
</form>

<br>

<table class="table table-bordered table-striped text-center">
<tr class="table-dark">
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Salary</th>
    <th>Email</th>
    <th>Phone</th>
</tr>

{% for emp in employees %}
<tr>
    <td>{{ emp[0] }}</td>
    <td>{{ emp[1] }}</td>
    <td>{{ emp[2] }}</td>
    <td>{{ emp[3] }}</td>
    <td>{{ emp[4] }}</td>
    <td>{{ emp[5] }}</td>
</tr>
{% endfor %}
</table>
</div>
</div>
</body>
</html>
